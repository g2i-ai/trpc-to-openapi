name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Dry run (skip branch creation and PR)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare-release:
    name: Prepare Release
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CHANGESET_RELEASE_APP_ID }}
          private-key: ${{ secrets.CHANGESET_RELEASE_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.18.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run changeset version
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: pnpm changeset version

      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No version changes detected. Are there any pending changesets?"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Dry run summary
        if: inputs.dry-run && steps.changes.outputs.has_changes == 'true'
        run: |
          echo "## Dry Run Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "Version: v${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Changed files:" >> "$GITHUB_STEP_SUMMARY"
          git diff --name-only >> "$GITHUB_STEP_SUMMARY"

      - name: Create release branch and PR
        if: "!inputs.dry-run && steps.changes.outputs.has_changes == 'true'"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          VERSION="v${{ steps.version.outputs.version }}"
          BRANCH="release/${VERSION}"

          git config user.name "g2i-release-bot[bot]"
          git config user.email "266146078+g2i-release-bot[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add -A
          git commit -m "chore(release): ${VERSION}"
          git push origin "$BRANCH"

          gh pr create \
            --base master \
            --head "$BRANCH" \
            --title "chore(release): ${VERSION}" \
            --body "## Release ${VERSION}

          This PR was auto-generated by the prepare-release workflow.

          Merging this PR will trigger the release automation to create a git tag and GitHub Release."
